site_name: OSG School 2026
site_url: https://osg-htc.org/school-2026/
repo_name: null
theme:
  name: material
  logo: assets/OSG_Logo.svg
  favicon: assets/OSG_Logo.png

markdown_extensions:
  - attr_list
  - admonition
  - codehilite:
      guess_lang: False
  - meta
  - pymdownx.details
  - pymdownx.snippets:
      base_path: docs/materials/data
  - toc:
      permalink: True
  - footnotes
#  - pymdownx.emoji:
